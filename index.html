<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Tailwind Navbar</title>
  <link rel="stylesheet" href="./output.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --button-light: #ffffff;
      --button-dark: #171717;
      --button-line: rgba(17, 17, 17, 0.08);
      --text-muted: rgba(17, 17, 17, 0.42);
    }

    body {
      font-family: "Manrope", "Segoe UI", sans-serif;
    }
  </style>
</head>
<body class="min-h-screen bg-[#F0F0F0] text-[#111111]">
  <header class="mx-auto w-full max-w-[1280px] px-4 pt-4 sm:px-6 sm:pt-5 lg:px-8">
    <nav class="flex items-center justify-between py-4 sm:py-5">
      <div class="flex items-center gap-5 lg:gap-11">
        <a href="#" aria-label="Home" class="shrink-0">
          <span class="grid h-12 w-12 place-items-center rounded-full border border-black/8 bg-[linear-gradient(180deg,#d8d8d8_0%,#c5c5c5_100%)] shadow-[0_8px_24px_rgba(17,17,17,0.10)]">
            <span class="grid h-[42px] w-[42px] place-items-center rounded-full bg-[#111111] text-[22px] font-extrabold tracking-[-0.12em] text-[#ded7cf]">
              i8
            </span>
          </span>
        </a>

        <div class="hidden items-center gap-6 md:flex lg:gap-11">
          <a href="#" class="text-sm font-semibold tracking-[-0.02em] text-[color:var(--text-muted)] transition hover:text-black lg:text-[15px]">
            About us
          </a>
          <a href="#" class="text-sm font-semibold tracking-[-0.02em] text-[color:var(--text-muted)] transition hover:text-black lg:text-[15px]">
            How it works
          </a>
          <a href="#" class="text-sm font-semibold tracking-[-0.02em] text-[color:var(--text-muted)] transition hover:text-black lg:text-[15px]">
            Pricing
          </a>
          <a href="#" class="text-sm font-semibold tracking-[-0.02em] text-[color:var(--text-muted)] transition hover:text-black lg:text-[15px]">
            FAQs
          </a>
        </div>
      </div>

      <div class="hidden items-center gap-4 md:flex lg:gap-5">
        <a
          href="#"
          class="inline-flex min-w-[148px] items-center justify-center border border-black/6 bg-[color:var(--button-light)] px-8 py-5 text-lg font-semibold text-black transition hover:bg-[#f7f7f7]"
        >
          Login
        </a>
        <a
          href="#"
          class="inline-flex min-w-[140px] items-center justify-center border border-[#111111] bg-[color:var(--button-dark)] px-8 py-5 text-lg font-semibold text-white transition hover:bg-[#2a2a2a]"
        >
          Sign Up
        </a>
      </div>

      <button
        id="menuButton"
        type="button"
        aria-label="Open menu"
        aria-controls="mobileMenu"
        aria-expanded="false"
        class="inline-flex h-12 w-12 items-center justify-center rounded-full border border-black/8 bg-white text-[#111111] transition hover:bg-[#f7f7f7] md:hidden"
      >
        <span class="flex flex-col gap-1.5">
          <span class="h-0.5 w-5 rounded-full bg-[#111111]"></span>
          <span class="h-0.5 w-5 rounded-full bg-[#111111]"></span>
          <span class="h-0.5 w-5 rounded-full bg-[#111111]"></span>
        </span>
      </button>
    </nav>

    <div id="mobileMenu" class="hidden pb-6 md:hidden">
      <div class="rounded-[28px] border border-black/8 bg-white p-4 shadow-[0_18px_45px_rgba(17,17,17,0.08)]">
        <div class="flex flex-col gap-1">
          <a href="#" class="rounded-2xl px-4 py-3 text-base font-semibold text-black/70 transition hover:bg-black/4 hover:text-black">
            About us
          </a>
          <a href="#" class="rounded-2xl px-4 py-3 text-base font-semibold text-black/70 transition hover:bg-black/4 hover:text-black">
            How it works
          </a>
          <a href="#" class="rounded-2xl px-4 py-3 text-base font-semibold text-black/70 transition hover:bg-black/4 hover:text-black">
            Pricing
          </a>
          <a href="#" class="rounded-2xl px-4 py-3 text-base font-semibold text-black/70 transition hover:bg-black/4 hover:text-black">
            FAQs
          </a>
        </div>

        <div class="mt-4 grid gap-3 sm:grid-cols-2">
          <a
            href="#"
            class="inline-flex items-center justify-center rounded-2xl border border-black/6 bg-[color:var(--button-light)] px-5 py-4 text-base font-semibold text-black transition hover:bg-[#f7f7f7]"
          >
            Login
          </a>
          <a
            href="#"
            class="inline-flex items-center justify-center rounded-2xl border border-[#111111] bg-[color:var(--button-dark)] px-5 py-4 text-base font-semibold text-white transition hover:bg-[#2a2a2a]"
          >
            Sign Up
          </a>
        </div>
      </div>
    </div>
  </header>

  <script>
    const menuButton = document.getElementById("menuButton");
    const mobileMenu = document.getElementById("mobileMenu");

    menuButton.addEventListener("click", () => {
      const isHidden = mobileMenu.classList.contains("hidden");
      mobileMenu.classList.toggle("hidden");
      menuButton.setAttribute("aria-expanded", String(isHidden));
    });

    window.addEventListener("resize", () => {
      if (window.innerWidth >= 768) {
        mobileMenu.classList.add("hidden");
        menuButton.setAttribute("aria-expanded", "false");
      }
    });
  </script>
</body>
</html>
